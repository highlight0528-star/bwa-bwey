<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>線上擲筊 | 電子香</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Noto Serif TC", "PingFang TC", "Microsoft JhengHei", serif;
    background: radial-gradient(ellipse at top, #5a0f0f 0%, #2b0404 60%, #1a0202 100%);
    min-height: 100vh;
    color: #f5e6c8;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
    overflow-x: hidden;
  }
  .lanterns {
    font-size: 2rem;
    margin-bottom: 10px;
    letter-spacing: 40px;
    padding-left: 40px;
    animation: sway 3s ease-in-out infinite;
  }
  @keyframes sway {
    0%,100% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
  }
  h1 {
    font-size: 2.8rem;
    color: #ffd77a;
    text-shadow: 0 0 20px rgba(255, 200, 80, 0.6), 0 0 4px #000;
    letter-spacing: 8px;
    margin-bottom: 6px;
    font-weight: 900;
  }
  .subtitle {
    color: #d4a574;
    font-size: 0.95rem;
    letter-spacing: 4px;
    margin-bottom: 25px;
  }
  .altar {
    background: linear-gradient(180deg, rgba(70,10,10,0.85), rgba(30,5,5,0.95));
    border: 2px solid #b8860b;
    border-radius: 12px;
    padding: 30px 25px;
    max-width: 520px;
    width: 100%;
    box-shadow: 0 0 40px rgba(255, 180, 60, 0.2), inset 0 0 30px rgba(0,0,0,0.5);
    text-align: center;
    position: relative;
  }
  .altar::before, .altar::after {
    content: "福";
    position: absolute;
    top: -15px;
    width: 32px; height: 32px;
    background: #c8102e;
    color: #ffd77a;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px;
    font-size: 1.1rem;
    border: 2px solid #ffd77a;
    transform: rotate(45deg);
  }
  .altar::before { left: 20px; }
  .altar::after { right: 20px; }
  .question-box { margin-bottom: 20px; }
  .question-box label {
    display: block;
    color: #ffd77a;
    margin-bottom: 8px;
    font-size: 1rem;
    letter-spacing: 2px;
  }
  .question-box input {
    width: 100%;
    padding: 12px;
    background: rgba(255, 230, 180, 0.1);
    border: 1px solid #b8860b;
    border-radius: 6px;
    color: #fff5e0;
    font-size: 1rem;
    text-align: center;
    font-family: inherit;
  }
  .question-box input::placeholder { color: #8a7556; }
  .question-box input:focus {
    outline: none;
    border-color: #ffd77a;
    box-shadow: 0 0 10px rgba(255, 215, 122, 0.4);
  }
  .stage {
    height: 220px;
    position: relative;
    margin: 20px 0;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 30px;
    perspective: 600px;
  }
  .ground {
    position: absolute;
    bottom: 10px;
    left: 10%; right: 10%;
    height: 6px;
    background: radial-gradient(ellipse at center, rgba(255,200,100,0.25), transparent 70%);
    border-radius: 50%;
  }
  .jiao {
    width: 85px;
    height: 120px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.3s;
  }
  .jiao .face {
    position: absolute;
    inset: 0;
    border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%;
    backface-visibility: hidden;
  }
  .jiao .flat {
    background: radial-gradient(ellipse at 35% 30%, #d4342a, #8b1a10 60%, #4a0a05);
    box-shadow: inset -6px -10px 15px rgba(0,0,0,0.6), inset 4px 4px 10px rgba(255,180,150,0.3), 0 8px 20px rgba(0,0,0,0.6);
    border: 2px solid #2a0500;
  }
  .jiao .curved {
    background: radial-gradient(ellipse at 50% 40%, #a02318, #5a0c05 70%, #1a0000);
    box-shadow: inset 0 -20px 25px rgba(0,0,0,0.7), 0 8px 20px rgba(0,0,0,0.6);
    border: 2px solid #2a0500;
    transform: rotateX(180deg);
  }
  .jiao.face-up .flat { display: block; }
  .jiao.face-up .curved { display: none; }
  .jiao.face-down .flat { display: none; }
  .jiao.face-down .curved { display: block; }
  @keyframes throw1 {
    0% { transform: translate(0, 0) rotate(0deg); }
    30% { transform: translate(-30px, -180px) rotate(540deg); }
    60% { transform: translate(-50px, -60px) rotate(1080deg); }
    100% { transform: translate(-50px, 0) rotate(1440deg); }
  }
  @keyframes throw2 {
    0% { transform: translate(0, 0) rotate(0deg); }
    30% { transform: translate(30px, -200px) rotate(-540deg); }
    60% { transform: translate(50px, -50px) rotate(-1080deg); }
    100% { transform: translate(50px, 0) rotate(-1440deg); }
  }
  .throwing .jiao.left { animation: throw1 1.8s cubic-bezier(.5,.1,.5,1) forwards; }
  .throwing .jiao.right { animation: throw2 1.8s cubic-bezier(.5,.1,.5,1) forwards; }
  .btn {
    background: linear-gradient(180deg, #ffd77a, #b8860b);
    color: #3a1a00;
    border: 2px solid #7a4a00;
    padding: 14px 36px;
    font-size: 1.15rem;
    font-weight: bold;
    letter-spacing: 4px;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    box-shadow: 0 4px 0 #5a3500, 0 6px 20px rgba(255,180,60,0.3);
    margin: 5px;
  }
  .btn:hover:not(:disabled) {
    transform: translateY(2px);
    box-shadow: 0 2px 0 #5a3500, 0 4px 15px rgba(255,180,60,0.4);
  }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.secondary {
    background: linear-gradient(180deg, #6b2828, #3a1010);
    color: #ffd77a;
    border-color: #1a0000;
    box-shadow: 0 4px 0 #1a0000;
  }
  .result {
    min-height: 110px;
    margin-top: 20px;
    padding: 18px;
    border-radius: 8px;
    background: rgba(0,0,0,0.3);
    border: 1px dashed #b8860b;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.5s;
  }
  .result.show { opacity: 1; transform: translateY(0); }
  .result .name {
    font-size: 2rem;
    color: #ffd77a;
    text-shadow: 0 0 15px rgba(255, 215, 122, 0.7);
    letter-spacing: 6px;
    margin-bottom: 8px;
    font-weight: 900;
  }
  .result .meaning {
    color: #f5e6c8;
    font-size: 1rem;
    line-height: 1.7;
    letter-spacing: 1px;
  }
  .result .note {
    margin-top: 10px;
    font-size: 0.85rem;
    color: #d4a574;
    font-style: italic;
  }
  .history {
    margin-top: 18px;
    color: #a89070;
    font-size: 0.85rem;
    letter-spacing: 2px;
  }
  footer {
    margin-top: 30px;
    color: #8a7556;
    font-size: 0.8rem;
    text-align: center;
    letter-spacing: 2px;
  }
  @media (max-width: 500px) {
    h1 { font-size: 2rem; letter-spacing: 4px; }
    .jiao { width: 70px; height: 100px; }
    .stage { gap: 20px; height: 200px; }
  }
</style>
</head>
<body>
  <div class="lanterns">🏮🏮</div>
  <h1>線上擲筊</h1>
  <div class="subtitle">心 誠 則 靈</div>
  <div class="altar">
    <div class="question-box">
      <label for="question">請先默念您想請示的問題</label>
      <input type="text" id="question" placeholder="例如：今日是否適合談生意？" maxlength="50">
    </div>
    <div class="stage" id="stage">
      <div class="ground"></div>
      <div class="jiao left face-up" id="jiao1">
        <div class="face flat"></div>
        <div class="face curved"></div>
      </div>
      <div class="jiao right face-up" id="jiao2">
        <div class="face flat"></div>
        <div class="face curved"></div>
      </div>
    </div>
    <div>
      <button class="btn" id="throwBtn">擲 筊</button>
      <button class="btn secondary" id="resetBtn">重新請示</button>
    </div>
    <div class="result" id="result">
      <div class="name" id="resultName"></div>
      <div class="meaning" id="resultMeaning"></div>
      <div class="note" id="resultNote"></div>
    </div>
    <div class="history" id="history">已擲次數：0</div>
  </div>
  <footer>© 電子香｜誠心敬意，線上祈福</footer>
<script>
  const stage = document.getElementById('stage');
  const jiao1 = document.getElementById('jiao1');
  const jiao2 = document.getElementById('jiao2');
  const throwBtn = document.getElementById('throwBtn');
  const resetBtn = document.getElementById('resetBtn');
  const result = document.getElementById('result');
  const resultName = document.getElementById('resultName');
  const resultMeaning = document.getElementById('resultMeaning');
  const resultNote = document.getElementById('resultNote');
  const history = document.getElementById('history');
  const question = document.getElementById('question');
  let count = 0;
  let shengCount = 0;
  function interpret(a, b) {
    if (a !== b) {
      return { type: 'sheng', name: '聖 筊', meaning: '神明應允您的請示！一陰一陽，代表神明對此事給予肯定的答覆，您可安心前行。', note: '※ 傳統上重要事項需連得三聖筊方為確認' };
    }
    if (a === true && b === true) {
      return { type: 'xiao', name: '笑 筊', meaning: '兩筊皆陽。神明笑而不答，可能是問題不夠明確，或您心中已有答案。請重新思考後再請示。', note: '※ 試著把問題問得更具體些' };
    }
    return { type: 'yin', name: '陰 筊', meaning: '兩筊皆陰。神明不允此事，建議您三思而後行，或另尋其他方向。', note: '※ 心誠則靈，請耐心等候時機' };
  }
  function playClack() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const now = ctx.currentTime;
      [0, 0.08, 0.18].forEach((t, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(180 - i * 20, now + t);
        gain.gain.setValueAtTime(0.3, now + t);
        gain.gain.exponentialRampToValueAtTime(0.01, now + t + 0.15);
        osc.connect(gain).connect(ctx.destination);
        osc.start(now + t);
        osc.stop(now + t + 0.16);
      });
    } catch(e) {}
  }
  function throwJiao() {
    if (!question.value.trim()) {
      question.focus();
      question.style.borderColor = '#ff6b6b';
      setTimeout(() => question.style.borderColor = '', 1500);
      return;
    }
    throwBtn.disabled = true;
    result.classList.remove('show');
    jiao1.classList.remove('face-up', 'face-down');
    jiao2.classList.remove('face-up', 'face-down');
    void stage.offsetWidth;
    stage.classList.add('throwing');
    const a = Math.random() < 0.5;
    const b = Math.random() < 0.5;
    setTimeout(() => {
      jiao1.classList.add(a ? 'face-up' : 'face-down');
      jiao2.classList.add(b ? 'face-up' : 'face-down');
    }, 900);
    setTimeout(() => playClack(), 1600);
    setTimeout(() => {
      stage.classList.remove('throwing');
      const res = interpret(a, b);
      resultName.textContent = res.name;
      resultMeaning.textContent = res.meaning;
      resultNote.textContent = res.note;
      result.classList.add('show');
      count++;
      if (res.type === 'sheng') shengCount++; else shengCount = 0;
      let msg = `已擲次數：${count}`;
      if (shengCount > 0) msg += `　｜　連續聖筊：${shengCount}`;
      if (shengCount >= 3) msg += ' 🎉 三聖筊達成！';
      history.textContent = msg;
      throwBtn.disabled = false;
    }, 1850);
  }
  function reset() {
    question.value = '';
    count = 0;
    shengCount = 0;
    history.textContent = '已擲次數：0';
    result.classList.remove('show');
    jiao1.classList.remove('face-down');
    jiao1.classList.add('face-up');
    jiao2.classList.remove('face-down');
    jiao2.classList.add('face-up');
    question.focus();
  }
  throwBtn.addEventListener('click', throwJiao);
  resetBtn.addEventListener('click', reset);
  question.addEventListener('keydown', e => { if (e.key === 'Enter') throwJiao(); });
</script>
</body>
</html>
